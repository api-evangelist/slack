# Slack Conceptual GraphQL Schema
#
# This is a conceptual schema derived from the Slack Web API data model.
# Slack does not expose a native public GraphQL endpoint.
# This schema is intended for tooling, catalog enrichment, and documentation purposes.
#
# References:
#   Web API: https://docs.slack.dev/apis/web-api
#   Methods: https://docs.slack.dev/reference/methods
#   Block Kit: https://docs.slack.dev/reference/block-kit
#   Events API: https://docs.slack.dev/apis/events-api

schema {
  query: Query
}

type Query {
  workspace(id: ID!): Workspace
  channel(id: ID!): Channel
  conversation(id: ID!): Channel
  message(channelId: ID!, ts: String!): Message
  user(id: ID!): User
  userByEmail(email: String!): User
  file(id: ID!): File
  bot(id: ID!): Bot
  app(id: ID!): App
  reminder(id: ID!): Reminder
  userGroup(id: ID!): UserGroup

  channels(
    types: [ChannelType!]
    excludeArchived: Boolean
    limit: Int
    cursor: String
  ): ChannelConnection!

  users(limit: Int, cursor: String): UserConnection!

  conversationHistory(
    channelId: ID!
    oldest: String
    latest: String
    limit: Int
    cursor: String
  ): MessageConnection!

  conversationReplies(
    channelId: ID!
    ts: String!
    limit: Int
    cursor: String
  ): MessageConnection!

  files(
    channelId: ID
    userId: ID
    types: [FileType!]
    limit: Int
    cursor: String
  ): FileConnection!

  pins(channelId: ID!): [PinnedItem!]!

  reactions(userId: ID, limit: Int, cursor: String): ReactionItemConnection!

  reminders: [Reminder!]!

  userGroups(includeDisabled: Boolean): [UserGroup!]!

  searchMessages(query: String!, sort: SearchSort, limit: Int, cursor: String): MessageSearchConnection!

  searchFiles(query: String!, sort: SearchSort, limit: Int, cursor: String): FileSearchConnection!

  auditLogs(
    action: String
    actor: ID
    entity: ID
    oldest: Int
    latest: Int
    limit: Int
    cursor: String
  ): AuditEventConnection!

  dndInfo(userId: ID!): DndInfo!
  dndTeamInfo(users: [ID!]): DndTeamInfo!

  emoji: EmojiList!

  teamInfo: Workspace!

  apps(limit: Int, cursor: String): AppConnection!

  bookmarks(channelId: ID!): [Bookmark!]!

  canvas(id: ID!): Canvas

  lists(limit: Int, cursor: String): ListConnection!
}

# ─────────────────────────────────────────────
# Workspace / Team
# ─────────────────────────────────────────────

type Workspace {
  id: ID!
  name: String!
  domain: String!
  emailDomain: String
  icon: TeamIcon
  enterpriseId: ID
  enterpriseName: String
  isVerified: Boolean
  url: String
  plan: String
  description: String
  channels(types: [ChannelType!], limit: Int, cursor: String): ChannelConnection!
  users(limit: Int, cursor: String): UserConnection!
  apps(limit: Int, cursor: String): AppConnection!
  analytics: Analytics
}

type TeamIcon {
  image34: String
  image44: String
  image68: String
  image88: String
  image102: String
  image132: String
  image230: String
  imageOriginal: String
  imageDefault: Boolean
}

# ─────────────────────────────────────────────
# Channel / Conversation
# ─────────────────────────────────────────────

enum ChannelType {
  PUBLIC_CHANNEL
  PRIVATE_CHANNEL
  MPIM
  IM
}

type Channel {
  id: ID!
  name: String
  nameNormalized: String
  created: Int!
  creator: User
  isChannel: Boolean
  isGroup: Boolean
  isIm: Boolean
  isMpim: Boolean
  isPrivate: Boolean!
  isArchived: Boolean!
  isGeneral: Boolean
  isShared: Boolean
  isOrgShared: Boolean
  isMember: Boolean
  unlinked: Int
  topic: ChannelTopic
  purpose: ChannelPurpose
  previousNames: [String!]
  numMembers: Int
  locale: String
  lastRead: String
  latest: Message
  members(limit: Int, cursor: String): UserConnection
  history(oldest: String, latest: String, limit: Int, cursor: String): MessageConnection
  pins: [PinnedItem!]
  bookmarks: [Bookmark!]
  canvas: Canvas
}

type ChannelTopic {
  value: String!
  creator: ID
  lastSet: Int
}

type ChannelPurpose {
  value: String!
  creator: ID
  lastSet: Int
}

type ChannelConnection {
  nodes: [Channel!]!
  pageInfo: PageInfo!
}

# ─────────────────────────────────────────────
# Message
# ─────────────────────────────────────────────

enum MessageSubtype {
  BOT_MESSAGE
  ME_MESSAGE
  CHANNEL_JOIN
  CHANNEL_LEAVE
  CHANNEL_TOPIC
  CHANNEL_PURPOSE
  CHANNEL_NAME
  CHANNEL_ARCHIVE
  CHANNEL_UNARCHIVE
  FILE_SHARE
  FILE_COMMENT
  FILE_MENTION
  PINNED_ITEM
  UNPINNED_ITEM
  THREAD_BROADCAST
  TOMBSTONE
  SLACKBOT_RESPONSE
}

type Message {
  ts: String!
  type: String!
  subtype: MessageSubtype
  text: String
  user: User
  bot: Bot
  channel: Channel
  blocks: [LayoutBlock!]
  attachments: [Attachment!]
  reactions: [Reaction!]
  replyCount: Int
  replyUsersCount: Int
  latestReply: String
  replyUsers: [User!]
  threadTs: String
  parentUserId: ID
  files: [File!]
  upload: Boolean
  clientMsgId: String
  team: ID
  permalink: String
  pinned: Boolean
  edited: MessageEdit
  icons: MessageIcons
  botId: ID
  username: String
  appId: ID
  metadata: MessageMetadata
}

type MessageEdit {
  user: ID
  ts: String
}

type MessageIcons {
  emoji: String
  imageUrl: String
}

type MessageMetadata {
  eventType: String
  eventPayload: String
}

type MessageConnection {
  nodes: [Message!]!
  pageInfo: PageInfo!
  hasMore: Boolean
  responseMetadata: ResponseMetadata
}

type MessageSearchConnection {
  matches: [Message!]!
  total: Int
  pagination: Pagination
  pageInfo: PageInfo!
}

