}

type InputBlock implements LayoutBlock {
  type: BlockType!
  blockId: String
  label: TextObject!
  element: BlockElement!
  hint: TextObject
  optional: Boolean
  dispatchAction: Boolean
}

type HeaderBlock implements LayoutBlock {
  type: BlockType!
