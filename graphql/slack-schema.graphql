}

enum BlockType {
  SECTION
  DIVIDER
  IMAGE
  ACTIONS
  CONTEXT
  INPUT
  HEADER
  VIDEO
  RICH_TEXT
  FILE
}

type SectionBlock implements LayoutBlock {
  type: BlockType!
  blockId: String
  text: TextObject
  fields: [TextObject!]
  accessory: BlockElement
}

type DividerBlock implements LayoutBlock {
  type: BlockType!
  blockId: String
}

type ImageBlock implements LayoutBlock {
  type: BlockType!
  blockId: String
  imageUrl: String!
  altText: String!
