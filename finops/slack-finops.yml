principles:
  - name: Visibility
    description: Use Slack Analytics export and SCIM API for active vs licensed seats.
  - name: Allocation
    description: Map workspaces to cost centers; track guest counts separately.
  - name: Optimization
    description: Reclaim inactive seats monthly; downgrade Business+ workspaces that don't use SSO/compliance
      features.
  - name: Accountability
    description: Quarterly seat right-sizing; renew at observed P95 active user count.
