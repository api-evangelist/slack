    port: 9090
    transport: http
    description: MCP adapter for Slack Admin API — Remove. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-admin-emoji-remove
      description: Slack Post Admin Emoji Remove
