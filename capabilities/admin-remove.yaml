  - type: http
    namespace: admin-remove
    baseUri: ''
    description: Slack Admin API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: admin.emoji.remove
      path: /admin.emoji.remove
      operations:
      - name: postadminemojiremove
        method: POST
        description: Slack Post Admin Emoji Remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin.users.remove
      path: /admin.users.remove
      operations:
      - name: postadminusersremove
        method: POST
        description: Slack Post Admin Users Remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
