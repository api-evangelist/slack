naftiko: 1.0.0-alpha2
info:
  label: Slack Admin API — Remove
  description: 'Slack Admin API — Remove. 2 operations. Lead operation: Slack Post Admin Emoji Remove. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
