      name: admin-emoji-remove
      description: REST surface for admin.emoji.remove.
      operations:
      - method: POST
        name: postadminemojiremove
        description: Slack Post Admin Emoji Remove
        call: admin-remove.postadminemojiremove
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin-users-remove
      name: admin-users-remove
      description: REST surface for admin.users.remove.
      operations:
      - method: POST
        name: postadminusersremove
        description: Slack Post Admin Users Remove
        call: admin-remove.postadminusersremove
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
