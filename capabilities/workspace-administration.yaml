info:
  label: Slack Workspace Administration
  description: Unified workflow for workspace administration including admin controls, team settings, user management, user
    groups, authentication, and enterprise migration. Used by workspace administrators and IT teams.
  tags:
  - Slack
  - Administration
  - User Management
  - Enterprise
  created: '2026-04-18'
  modified: '2026-05-06'
