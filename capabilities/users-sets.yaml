naftiko: 1.0.0-alpha2
info:
  label: Slack Users API — Sets
  description: 'Slack Users API — Sets. 1 operations. Lead operation: Slack Post Users Profile Set. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Sets
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-sets
    baseUri: ''
    description: Slack Users API — Sets business capability. Self-contained, no shared references.
    resources:
    - name: users.profile.set
      path: /users.profile.set
      operations:
      - name: postusersprofileset
        method: POST
        description: Slack Post Users Profile Set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `users.profile:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: users-sets-rest
    port: 8080
    description: REST adapter for Slack Users API — Sets. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users-profile-set
      name: users-profile-set
      description: REST surface for users.profile.set.
      operations:
      - method: POST
        name: postusersprofileset
        description: Slack Post Users Profile Set
        call: users-sets.postusersprofileset
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-sets-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Users API — Sets. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-users-profile-set
      description: Slack Post Users Profile Set
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users-sets.postusersprofileset
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
