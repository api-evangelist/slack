naftiko: 1.0.0-alpha2
info:
  label: Slack DND API — Post
  description: 'Slack DND API — Post. 3 operations. Lead operation: Slack Post End Do Not Disturb. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Post
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: dnd-post
    baseUri: ''
    description: Slack DND API — Post business capability. Self-contained, no shared references.
    resources:
    - name: dnd.endDnd
      path: /dnd.endDnd
      operations:
      - name: postdndenddnd
        method: POST
        description: Slack Post End Do Not Disturb
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `dnd:write`'
          required: true
    - name: dnd.endSnooze
      path: /dnd.endSnooze
      operations:
      - name: postdndendsnooze
        method: POST
        description: Slack Post End Do Not Disturb Snooze
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `dnd:write`'
          required: true
    - name: dnd.setSnooze
      path: /dnd.setSnooze
      operations:
      - name: postdndsetsnooze
        method: POST
        description: Slack Post Do Not Disturb Snooze
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: dnd-post-rest
    port: 8080
    description: REST adapter for Slack DND API — Post. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/dnd-enddnd
      name: dnd-enddnd
      description: REST surface for dnd.endDnd.
      operations:
      - method: POST
        name: postdndenddnd
        description: Slack Post End Do Not Disturb
        call: dnd-post.postdndenddnd
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dnd-endsnooze
      name: dnd-endsnooze
      description: REST surface for dnd.endSnooze.
      operations:
      - method: POST
        name: postdndendsnooze
        description: Slack Post End Do Not Disturb Snooze
        call: dnd-post.postdndendsnooze
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dnd-setsnooze
      name: dnd-setsnooze
      description: REST surface for dnd.setSnooze.
      operations:
      - method: POST
        name: postdndsetsnooze
        description: Slack Post Do Not Disturb Snooze
        call: dnd-post.postdndsetsnooze
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dnd-post-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack DND API — Post. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-end-do-not
      description: Slack Post End Do Not Disturb
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dnd-post.postdndenddnd
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-end-do-not-2
      description: Slack Post End Do Not Disturb Snooze
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dnd-post.postdndendsnooze
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-do-not-disturb
      description: Slack Post Do Not Disturb Snooze
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dnd-post.postdndsetsnooze
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
