naftiko: 1.0.0-alpha2
info:
  label: Slack Reactions API — Remove
  description: 'Slack Reactions API — Remove. 1 operations. Lead operation: Slack Post Reactions Remove. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: reactions-remove
    baseUri: ''
    description: Slack Reactions API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: reactions.remove
      path: /reactions.remove
      operations:
      - name: postreactionsremove
        method: POST
        description: Slack Post Reactions Remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `reactions:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: reactions-remove-rest
    port: 8080
    description: REST adapter for Slack Reactions API — Remove. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reactions-remove
      name: reactions-remove
      description: REST surface for reactions.remove.
      operations:
      - method: POST
        name: postreactionsremove
        description: Slack Post Reactions Remove
        call: reactions-remove.postreactionsremove
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reactions-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Reactions API — Remove. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: slack-post-reactions-remove
      description: Slack Post Reactions Remove
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reactions-remove.postreactionsremove
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
