naftiko: 1.0.0-alpha2
info:
  label: Slack Stars API — Add
  description: 'Slack Stars API — Add. 1 operations. Lead operation: Slack Post Stars Add. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: stars-add
    baseUri: ''
    description: Slack Stars API — Add business capability. Self-contained, no shared references.
    resources:
    - name: stars.add
      path: /stars.add
      operations:
      - name: poststarsadd
        method: POST
        description: Slack Post Stars Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `stars:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: stars-add-rest
    port: 8080
    description: REST adapter for Slack Stars API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stars-add
      name: stars-add
      description: REST surface for stars.add.
      operations:
      - method: POST
        name: poststarsadd
        description: Slack Post Stars Add
        call: stars-add.poststarsadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stars-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Stars API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-stars-add
      description: Slack Post Stars Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: stars-add.poststarsadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
