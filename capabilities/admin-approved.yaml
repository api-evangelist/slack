naftiko: 1.0.0-alpha2
info:
  label: Slack Admin API — Approved
  description: 'Slack Admin API — Approved. 2 operations. Lead operation: Slack Get Admin Apps Approved List. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Approved
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-approved
    baseUri: ''
    description: Slack Admin API — Approved business capability. Self-contained, no shared references.
    resources:
    - name: admin.apps.approved.list
      path: /admin.apps.approved.list
      operations:
      - name: getadminappsapprovedlist
        method: GET
        description: Slack Get Admin Apps Approved List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `admin.apps:read`'
          required: true
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Must be between 1 - 1000 both inclusive.
        - name: cursor
          in: query
          type: string
          description: Set `cursor` to `next_cursor` returned by the previous call to list items in the next page
        - name: team_id
          in: query
          type: string
        - name: enterprise_id
          in: query
          type: string
    - name: admin.inviteRequests.approved.list
      path: /admin.inviteRequests.approved.list
      operations:
      - name: getadmininviterequestsapprovedlist
        method: GET
        description: Slack Get Admin Inviterequests Approved List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `admin.invites:read`'
          required: true
        - name: team_id
          in: query
          type: string
          description: ID for the workspace where the invite requests were made.
        - name: cursor
          in: query
          type: string
          description: Value of the `next_cursor` field sent as part of the previous API response
        - name: limit
          in: query
          type: integer
          description: The number of results that will be returned by the API on each invocation. Must be between 1 - 1000,
            both inclusive
  exposes:
  - type: rest
    namespace: admin-approved-rest
    port: 8080
    description: REST adapter for Slack Admin API — Approved. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin-apps-approved-list
      name: admin-apps-approved-list
      description: REST surface for admin.apps.approved.list.
      operations:
      - method: GET
        name: getadminappsapprovedlist
        description: Slack Get Admin Apps Approved List
        call: admin-approved.getadminappsapprovedlist
        with:
          token: rest.token
          limit: rest.limit
          cursor: rest.cursor
          team_id: rest.team_id
          enterprise_id: rest.enterprise_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin-inviterequests-approved-list
      name: admin-inviterequests-approved-list
      description: REST surface for admin.inviteRequests.approved.list.
      operations:
      - method: GET
        name: getadmininviterequestsapprovedlist
        description: Slack Get Admin Inviterequests Approved List
        call: admin-approved.getadmininviterequestsapprovedlist
        with:
          token: rest.token
          team_id: rest.team_id
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-approved-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Admin API — Approved. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-admin-apps-approved
      description: Slack Get Admin Apps Approved List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-approved.getadminappsapprovedlist
      with:
        token: tools.token
        limit: tools.limit
        cursor: tools.cursor
        team_id: tools.team_id
        enterprise_id: tools.enterprise_id
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-admin-inviterequests-approved
      description: Slack Get Admin Inviterequests Approved List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-approved.getadmininviterequestsapprovedlist
      with:
        token: tools.token
        team_id: tools.team_id
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
