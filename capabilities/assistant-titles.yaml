naftiko: 1.0.0-alpha2
info:
  label: Slack Assistant API — Titles
  description: 'Slack Assistant API — Titles. 1 operations. Lead operation: Set Assistant Thread Title. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Titles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: assistant-titles
    baseUri: https://slack.com/api
    description: Slack Assistant API — Titles business capability. Self-contained, no shared references.
    resources:
    - name: assistant.threads.setTitle
      path: /assistant.threads.setTitle
      operations:
      - name: postassistantthreadssettitle
        method: POST
        description: Set Assistant Thread Title
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `assistant:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: assistant-titles-rest
    port: 8080
    description: REST adapter for Slack Assistant API — Titles. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/assistant-threads-settitle
      name: assistant-threads-settitle
      description: REST surface for assistant.threads.setTitle.
      operations:
      - method: POST
        name: postassistantthreadssettitle
        description: Set Assistant Thread Title
        call: assistant-titles.postassistantthreadssettitle
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: assistant-titles-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Assistant API — Titles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: set-assistant-thread-title
      description: Set Assistant Thread Title
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: assistant-titles.postassistantthreadssettitle
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
