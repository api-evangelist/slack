  description: 'Slack Conversations API — Create. 1 operations. Lead operation: Slack Post Conversations Create. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
