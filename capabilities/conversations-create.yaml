  - type: http
    namespace: conversations-create
    baseUri: ''
    description: Slack Conversations API — Create business capability. Self-contained, no shared references.
    resources:
    - name: conversations.create
      path: /conversations.create
      operations:
      - name: postconversationscreate
        method: POST
        description: Slack Post Conversations Create
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `conversations:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
