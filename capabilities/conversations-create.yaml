      description: Slack Post Conversations Create
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-create.postconversationscreate
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
