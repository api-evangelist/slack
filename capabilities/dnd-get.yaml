naftiko: 1.0.0-alpha2
info:
  label: Slack DND API — Get
  description: 'Slack DND API — Get. 2 operations. Lead operation: Slack Get Do Not Disturb Info. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: dnd-get
    baseUri: ''
    description: Slack DND API — Get business capability. Self-contained, no shared references.
    resources:
    - name: dnd.info
      path: /dnd.info
      operations:
      - name: getdndinfo
        method: GET
        description: Slack Get Do Not Disturb Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `dnd:read`'
        - name: user
          in: query
          type: string
          description: User to fetch status for (defaults to current user)
    - name: dnd.teamInfo
      path: /dnd.teamInfo
      operations:
      - name: getdndteaminfo
        method: GET
        description: Slack Get Do Not Disturb Team Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `dnd:read`'
        - name: users
          in: query
          type: string
          description: Comma-separated list of users to fetch Do Not Disturb status for
  exposes:
  - type: rest
    namespace: dnd-get-rest
    port: 8080
    description: REST adapter for Slack DND API — Get. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/dnd-info
      name: dnd-info
      description: REST surface for dnd.info.
      operations:
      - method: GET
        name: getdndinfo
        description: Slack Get Do Not Disturb Info
        call: dnd-get.getdndinfo
        with:
          token: rest.token
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dnd-teaminfo
      name: dnd-teaminfo
      description: REST surface for dnd.teamInfo.
      operations:
      - method: GET
        name: getdndteaminfo
        description: Slack Get Do Not Disturb Team Information
        call: dnd-get.getdndteaminfo
        with:
          token: rest.token
          users: rest.users
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dnd-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack DND API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-do-not-disturb
      description: Slack Get Do Not Disturb Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dnd-get.getdndinfo
      with:
        token: tools.token
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-do-not-disturb-2
      description: Slack Get Do Not Disturb Team Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dnd-get.getdndteaminfo
      with:
        token: tools.token
        users: tools.users
      outputParameters:
      - type: object
        mapping: $.
