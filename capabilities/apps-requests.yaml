naftiko: 1.0.0-alpha2
info:
  label: Slack Apps API — Requests
  description: 'Slack Apps API — Requests. 2 operations. Lead operation: Slack Get Apps Permissions Request. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: apps-requests
    baseUri: ''
    description: Slack Apps API — Requests business capability. Self-contained, no shared references.
    resources:
    - name: apps.permissions.request
      path: /apps.permissions.request
      operations:
      - name: getappspermissionsrequest
        method: GET
        description: Slack Get Apps Permissions Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `none`'
          required: true
        - name: scopes
          in: query
          type: string
          description: A comma separated list of scopes to request for
          required: true
        - name: trigger_id
          in: query
          type: string
          description: Token used to trigger the permissions API
          required: true
    - name: apps.permissions.users.request
      path: /apps.permissions.users.request
      operations:
      - name: getappspermissionsusersrequest
        method: GET
        description: Slack Get Apps Permissions Users Request
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `none`'
          required: true
        - name: scopes
          in: query
          type: string
          description: A comma separated list of user scopes to request for
          required: true
        - name: trigger_id
          in: query
          type: string
          description: Token used to trigger the request
          required: true
        - name: user
          in: query
          type: string
          description: The user this scope is being requested for
          required: true
  exposes:
  - type: rest
    namespace: apps-requests-rest
    port: 8080
    description: REST adapter for Slack Apps API — Requests. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/apps-permissions-request
      name: apps-permissions-request
      description: REST surface for apps.permissions.request.
      operations:
      - method: GET
        name: getappspermissionsrequest
        description: Slack Get Apps Permissions Request
        call: apps-requests.getappspermissionsrequest
        with:
          token: rest.token
          scopes: rest.scopes
          trigger_id: rest.trigger_id
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/apps-permissions-users-request
      name: apps-permissions-users-request
      description: REST surface for apps.permissions.users.request.
      operations:
      - method: GET
        name: getappspermissionsusersrequest
        description: Slack Get Apps Permissions Users Request
        call: apps-requests.getappspermissionsusersrequest
        with:
          token: rest.token
          scopes: rest.scopes
          trigger_id: rest.trigger_id
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: apps-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Apps API — Requests. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-apps-permissions-request
      description: Slack Get Apps Permissions Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apps-requests.getappspermissionsrequest
      with:
        token: tools.token
        scopes: tools.scopes
        trigger_id: tools.trigger_id
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-apps-permissions-users
      description: Slack Get Apps Permissions Users Request
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: apps-requests.getappspermissionsusersrequest
      with:
        token: tools.token
        scopes: tools.scopes
        trigger_id: tools.trigger_id
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
