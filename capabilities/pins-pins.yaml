naftiko: 1.0.0-alpha2
info:
  label: Slack Pins API — Pins
  description: 'Slack Pins API — Pins. 3 operations. Lead operation: Slack Post Pins Add. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Pins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: pins-pins
    baseUri: ''
    description: Slack Pins API — Pins business capability. Self-contained, no shared references.
    resources:
    - name: pins.add
      path: /pins.add
      operations:
      - name: postpinsadd
        method: POST
        description: Slack Post Pins Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `pins:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pins.list
      path: /pins.list
      operations:
      - name: getpinslist
        method: GET
        description: Slack Get Pins List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `pins:read`'
          required: true
        - name: channel
          in: query
          type: string
          description: Channel to get pinned items for.
          required: true
    - name: pins.remove
      path: /pins.remove
      operations:
      - name: postpinsremove
        method: POST
        description: Slack Post Pins Remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `pins:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: pins-pins-rest
    port: 8080
    description: REST adapter for Slack Pins API — Pins. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/pins-add
      name: pins-add
      description: REST surface for pins.add.
      operations:
      - method: POST
        name: postpinsadd
        description: Slack Post Pins Add
        call: pins-pins.postpinsadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins-list
      name: pins-list
      description: REST surface for pins.list.
      operations:
      - method: GET
        name: getpinslist
        description: Slack Get Pins List
        call: pins-pins.getpinslist
        with:
          token: rest.token
          channel: rest.channel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins-remove
      name: pins-remove
      description: REST surface for pins.remove.
      operations:
      - method: POST
        name: postpinsremove
        description: Slack Post Pins Remove
        call: pins-pins.postpinsremove
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pins-pins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Pins API — Pins. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-pins-add
      description: Slack Post Pins Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pins-pins.postpinsadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-pins-list
      description: Slack Get Pins List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: pins-pins.getpinslist
      with:
        token: tools.token
        channel: tools.channel
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-pins-remove
      description: Slack Post Pins Remove
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pins-pins.postpinsremove
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
