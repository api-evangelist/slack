naftiko: 1.0.0-alpha2
info:
  label: Slack Conversations API — Members
  description: 'Slack Conversations API — Members. 1 operations. Lead operation: Slack Get Conversations Members. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Members
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-members
    baseUri: ''
    description: Slack Conversations API — Members business capability. Self-contained, no shared references.
    resources:
    - name: conversations.members
      path: /conversations.members
      operations:
      - name: getconversationsmembers
        method: GET
        description: Slack Get Conversations Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `conversations:read`'
        - name: channel
          in: query
          type: string
          description: ID of the conversation to retrieve members for
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Fewer than the requested number of items may be returned, even
            if the end of the users list hasn't been reached.
        - name: cursor
          in: query
          type: string
          description: Paginate through collections of data by setting the `cursor` parameter to a `next_cursor` attribute
            returned by a previous request's `response_metadata`. Defaul
  exposes:
  - type: rest
    namespace: conversations-members-rest
    port: 8080
    description: REST adapter for Slack Conversations API — Members. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/conversations-members
      name: conversations-members
      description: REST surface for conversations.members.
      operations:
      - method: GET
        name: getconversationsmembers
        description: Slack Get Conversations Members
        call: conversations-members.getconversationsmembers
        with:
          token: rest.token
          channel: rest.channel
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-members-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Conversations API — Members. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: slack-get-conversations-members
      description: Slack Get Conversations Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: conversations-members.getconversationsmembers
      with:
        token: tools.token
        channel: tools.channel
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
