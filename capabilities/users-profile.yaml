naftiko: 1.0.0-alpha2
info:
  label: Slack Users API — Profile
  description: 'Slack Users API — Profile. 2 operations. Lead operation: Slack Get Users Profile Get. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Profile
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: users-profile
    baseUri: ''
    description: Slack Users API — Profile business capability. Self-contained, no shared references.
    resources:
    - name: users.profile.get
      path: /users.profile.get
      operations:
      - name: getusersprofileget
        method: GET
        description: Slack Get Users Profile Get
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `users.profile:read`'
          required: true
        - name: include_labels
          in: query
          type: boolean
          description: Include labels for each ID in custom profile fields
        - name: user
          in: query
          type: string
          description: User to retrieve profile info for
    - name: users.profile.set
      path: /users.profile.set
      operations:
      - name: postusersprofileset
        method: POST
        description: Slack Post Users Profile Set
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `users.profile:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: users-profile-rest
    port: 8080
    description: REST adapter for Slack Users API — Profile. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/users-profile-get
      name: users-profile-get
      description: REST surface for users.profile.get.
      operations:
      - method: GET
        name: getusersprofileget
        description: Slack Get Users Profile Get
        call: users-profile.getusersprofileget
        with:
          token: rest.token
          include_labels: rest.include_labels
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users-profile-set
      name: users-profile-set
      description: REST surface for users.profile.set.
      operations:
      - method: POST
        name: postusersprofileset
        description: Slack Post Users Profile Set
        call: users-profile.postusersprofileset
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: users-profile-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Users API — Profile. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-users-profile-get
      description: Slack Get Users Profile Get
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: users-profile.getusersprofileget
      with:
        token: tools.token
        include_labels: tools.include_labels
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-users-profile-set
      description: Slack Post Users Profile Set
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: users-profile.postusersprofileset
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
