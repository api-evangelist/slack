naftiko: 1.0.0-alpha2
info:
  label: Slack DND API — Teams
  description: 'Slack DND API — Teams. 1 operations. Lead operation: Slack Get Do Not Disturb Team Information. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Teams
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: dnd-teams
    baseUri: ''
    description: Slack DND API — Teams business capability. Self-contained, no shared references.
    resources:
    - name: dnd.teamInfo
      path: /dnd.teamInfo
      operations:
      - name: getdndteaminfo
        method: GET
        description: Slack Get Do Not Disturb Team Information
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `dnd:read`'
        - name: users
          in: query
          type: string
          description: Comma-separated list of users to fetch Do Not Disturb status for
  exposes:
  - type: rest
    namespace: dnd-teams-rest
    port: 8080
    description: REST adapter for Slack DND API — Teams. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/dnd-teaminfo
      name: dnd-teaminfo
      description: REST surface for dnd.teamInfo.
      operations:
      - method: GET
        name: getdndteaminfo
        description: Slack Get Do Not Disturb Team Information
        call: dnd-teams.getdndteaminfo
        with:
          token: rest.token
          users: rest.users
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dnd-teams-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack DND API — Teams. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-do-not-disturb
      description: Slack Get Do Not Disturb Team Information
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dnd-teams.getdndteaminfo
      with:
        token: tools.token
        users: tools.users
      outputParameters:
      - type: object
        mapping: $.
