naftiko: 1.0.0-alpha2
info:
  label: Slack Reminders API — Get
  description: 'Slack Reminders API — Get. 2 operations. Lead operation: Slack Get Reminders Info. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: reminders-get
    baseUri: ''
    description: Slack Reminders API — Get business capability. Self-contained, no shared references.
    resources:
    - name: reminders.info
      path: /reminders.info
      operations:
      - name: getremindersinfo
        method: GET
        description: Slack Get Reminders Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `reminders:read`'
        - name: reminder
          in: query
          type: string
          description: The ID of the reminder
    - name: reminders.list
      path: /reminders.list
      operations:
      - name: getreminderslist
        method: GET
        description: Slack Get Reminders List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `reminders:read`'
  exposes:
  - type: rest
    namespace: reminders-get-rest
    port: 8080
    description: REST adapter for Slack Reminders API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reminders-info
      name: reminders-info
      description: REST surface for reminders.info.
      operations:
      - method: GET
        name: getremindersinfo
        description: Slack Get Reminders Info
        call: reminders-get.getremindersinfo
        with:
          token: rest.token
          reminder: rest.reminder
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/reminders-list
      name: reminders-list
      description: REST surface for reminders.list.
      operations:
      - method: GET
        name: getreminderslist
        description: Slack Get Reminders List
        call: reminders-get.getreminderslist
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reminders-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Reminders API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-reminders-info
      description: Slack Get Reminders Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reminders-get.getremindersinfo
      with:
        token: tools.token
        reminder: tools.reminder
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-reminders-list
      description: Slack Get Reminders List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: reminders-get.getreminderslist
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
