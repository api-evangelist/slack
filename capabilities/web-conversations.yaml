          value: $.
        inputParameters:
        - name: channel
          in: query
          type: string
          required: true
        - name: ts
          in: query
          type: string
          description: Unique identifier of the parent message. This is the ts value of the parent message.
          required: true
        - name: cursor
          in: query
          type: string
        - name: inclusive
          in: query
          type: boolean
        - name: latest
          in: query
          type: string
        - name: limit
          in: query
