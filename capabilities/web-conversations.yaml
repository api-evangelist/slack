          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: conversations.list
      path: /conversations.list
      operations:
      - name: conversationslist
        method: GET
        description: Slack List All Channels
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: cursor
          in: query
          type: string
          description: Paginate through collections by setting the cursor parameter to a next_cursor attribute returned by
            a previous request.
        - name: exclude_archived
          in: query
          type: boolean
          description: Set to true to exclude archived channels from the list.
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Fewer than the requested number of items may be returned, even
            if the end of the list hasn't been reached. Maximum of 100
        - name: team_id
          in: query
          type: string
          description: Required for org-wide app tokens. A single team ID to list channels in.
        - name: types
          in: query
          type: string
          description: 'Mix and match channel types by providing a comma-separated list. Options: public_channel, private_channel,
            mpim, im.'
