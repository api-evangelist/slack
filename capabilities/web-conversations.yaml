naftiko: 1.0.0-alpha2
info:
  label: Slack Web API — Conversations
  description: 'Slack Web API — Conversations. 14 operations. Lead operation: Slack Archive a Channel. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Conversations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-conversations
    baseUri: https://slack.com/api
    description: Slack Web API — Conversations business capability. Self-contained, no shared references.
    resources:
    - name: conversations.archive
      path: /conversations.archive
      operations:
      - name: conversationsarchive
        method: POST
        description: Slack Archive a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: conversations.create
      path: /conversations.create
      operations:
      - name: conversationscreate
        method: POST
        description: Slack Create a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: conversations.history
      path: /conversations.history
      operations:
      - name: conversationshistory
        method: GET
        description: Slack Fetch Message History
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: query
          type: string
          description: Conversation ID to fetch history for.
          required: true
        - name: cursor
          in: query
          type: string
          description: Paginate through collections by setting the cursor parameter to a next_cursor attribute returned by
            a previous request.
        - name: inclusive
          in: query
          type: boolean
          description: Include messages with oldest or latest timestamps in results.
        - name: latest
          in: query
          type: string
          description: Only messages before this Unix timestamp will be included. Default is the current time.
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Default 100, max 999.
        - name: oldest
          in: query
          type: string
          description: Only messages after this Unix timestamp will be included. Default is 0.
        - name: include_all_metadata
          in: query
          type: boolean
          description: Return all metadata associated with messages.
    - name: conversations.info
      path: /conversations.info
      operations:
      - name: conversationsinfo
        method: GET
        description: Slack Get Information About a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: query
          type: string
          description: The conversation ID to get info on.
          required: true
        - name: include_locale
          in: query
          type: boolean
          description: Set to true to receive the locale for this conversation.
        - name: include_num_members
          in: query
          type: boolean
          description: Set to true to include the member count.
    - name: conversations.invite
      path: /conversations.invite
      operations:
      - name: conversationsinvite
        method: POST
        description: Slack Invite Users to a Channel
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: conversations.join
      path: /conversations.join
      operations:
      - name: conversationsjoin
        method: POST
        description: Slack Join an Existing Conversation
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: conversations.leave
