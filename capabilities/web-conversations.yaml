          type: string
          description: ID of the conversation to retrieve members for.
          required: true
        - name: cursor
          in: query
          type: string
        - name: limit
          in: query
          type: integer
    - name: conversations.rename
      path: /conversations.rename
      operations:
      - name: conversationsrename
        method: POST
        description: Slack Rename a Conversation
        outputRawFormat: json
        outputParameters:
