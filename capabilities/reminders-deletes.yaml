naftiko: 1.0.0-alpha2
info:
  label: Slack Reminders API — Deletes
  description: 'Slack Reminders API — Deletes. 1 operations. Lead operation: Slack Post Reminders Delete. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Deletes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: reminders-deletes
    baseUri: ''
    description: Slack Reminders API — Deletes business capability. Self-contained, no shared references.
    resources:
    - name: reminders.delete
      path: /reminders.delete
      operations:
      - name: postremindersdelete
        method: POST
        description: Slack Post Reminders Delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `reminders:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: reminders-deletes-rest
    port: 8080
    description: REST adapter for Slack Reminders API — Deletes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reminders-delete
      name: reminders-delete
      description: REST surface for reminders.delete.
      operations:
      - method: POST
        name: postremindersdelete
        description: Slack Post Reminders Delete
        call: reminders-deletes.postremindersdelete
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reminders-deletes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Reminders API — Deletes. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: slack-post-reminders-delete
      description: Slack Post Reminders Delete
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reminders-deletes.postremindersdelete
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
