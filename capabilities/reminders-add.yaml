naftiko: 1.0.0-alpha2
info:
  label: Slack Reminders API — Add
  description: 'Slack Reminders API — Add. 1 operations. Lead operation: Slack Post Reminders Add. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: reminders-add
    baseUri: ''
    description: Slack Reminders API — Add business capability. Self-contained, no shared references.
    resources:
    - name: reminders.add
      path: /reminders.add
      operations:
      - name: postremindersadd
        method: POST
        description: Slack Post Reminders Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `reminders:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: reminders-add-rest
    port: 8080
    description: REST adapter for Slack Reminders API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reminders-add
      name: reminders-add
      description: REST surface for reminders.add.
      operations:
      - method: POST
        name: postremindersadd
        description: Slack Post Reminders Add
        call: reminders-add.postremindersadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reminders-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Reminders API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-reminders-add
      description: Slack Post Reminders Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reminders-add.postremindersadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
