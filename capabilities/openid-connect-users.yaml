naftiko: 1.0.0-alpha2
info:
  label: Slack OpenID Connect API — Users
  description: 'Slack OpenID Connect API — Users. 1 operations. Lead operation: Get OpenID Connect User Info. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: openid-connect-users
    baseUri: https://slack.com/api
    description: Slack OpenID Connect API — Users business capability. Self-contained, no shared references.
    resources:
    - name: openid.connect.userInfo
      path: /openid.connect.userInfo
      operations:
      - name: getopenidconnectuserinfo
        method: GET
        description: Get OpenID Connect User Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: OpenID Connect access token.
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: openid-connect-users-rest
    port: 8080
    description: REST adapter for Slack OpenID Connect API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/openid-connect-userinfo
      name: openid-connect-userinfo
      description: REST surface for openid.connect.userInfo.
      operations:
      - method: GET
        name: getopenidconnectuserinfo
        description: Get OpenID Connect User Info
        call: openid-connect-users.getopenidconnectuserinfo
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openid-connect-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack OpenID Connect API — Users. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: get-openid-connect-user-info
      description: Get OpenID Connect User Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openid-connect-users.getopenidconnectuserinfo
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
