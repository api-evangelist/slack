naftiko: 1.0.0-alpha2
info:
  label: Slack Admin API — Requests
  description: 'Slack Admin API — Requests. 1 operations. Lead operation: Slack Get Admin Apps Requests List. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Requests
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-requests
    baseUri: ''
    description: Slack Admin API — Requests business capability. Self-contained, no shared references.
    resources:
    - name: admin.apps.requests.list
      path: /admin.apps.requests.list
      operations:
      - name: getadminappsrequestslist
        method: GET
        description: Slack Get Admin Apps Requests List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `admin.apps:read`'
          required: true
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Must be between 1 - 1000 both inclusive.
        - name: cursor
          in: query
          type: string
          description: Set `cursor` to `next_cursor` returned by the previous call to list items in the next page
        - name: team_id
          in: query
          type: string
  exposes:
  - type: rest
    namespace: admin-requests-rest
    port: 8080
    description: REST adapter for Slack Admin API — Requests. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin-apps-requests-list
      name: admin-apps-requests-list
      description: REST surface for admin.apps.requests.list.
      operations:
      - method: GET
        name: getadminappsrequestslist
        description: Slack Get Admin Apps Requests List
        call: admin-requests.getadminappsrequestslist
        with:
          token: rest.token
          limit: rest.limit
          cursor: rest.cursor
          team_id: rest.team_id
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-requests-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Admin API — Requests. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-admin-apps-requests
      description: Slack Get Admin Apps Requests List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: admin-requests.getadminappsrequestslist
      with:
        token: tools.token
        limit: tools.limit
        cursor: tools.cursor
        team_id: tools.team_id
      outputParameters:
      - type: object
        mapping: $.
