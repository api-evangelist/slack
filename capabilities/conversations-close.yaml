naftiko: 1.0.0-alpha2
info:
  label: Slack Conversations API — Close
  description: 'Slack Conversations API — Close. 1 operations. Lead operation: Slack Post Conversations Close. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Close
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-close
    baseUri: ''
    description: Slack Conversations API — Close business capability. Self-contained, no shared references.
    resources:
    - name: conversations.close
      path: /conversations.close
      operations:
      - name: postconversationsclose
        method: POST
        description: Slack Post Conversations Close
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `conversations:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: conversations-close-rest
    port: 8080
    description: REST adapter for Slack Conversations API — Close. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/conversations-close
      name: conversations-close
      description: REST surface for conversations.close.
      operations:
      - method: POST
        name: postconversationsclose
        description: Slack Post Conversations Close
        call: conversations-close.postconversationsclose
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-close-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Conversations API — Close. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: slack-post-conversations-close
      description: Slack Post Conversations Close
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-close.postconversationsclose
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
