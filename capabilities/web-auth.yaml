naftiko: 1.0.0-alpha2
info:
  label: Slack Web API — Auth
  description: 'Slack Web API — Auth. 2 operations. Lead operation: Slack Revoke an Access Token. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Auth
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-auth
    baseUri: https://slack.com/api
    description: Slack Web API — Auth business capability. Self-contained, no shared references.
    resources:
    - name: auth.revoke
      path: /auth.revoke
      operations:
      - name: authrevoke
        method: POST
        description: Slack Revoke an Access Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: test
          in: query
          type: boolean
          description: Setting this parameter to true triggers a testing mode.
    - name: auth.test
      path: /auth.test
      operations:
      - name: authtest
        method: POST
        description: Slack Test Authentication
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-auth-rest
    port: 8080
    description: REST adapter for Slack Web API — Auth. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/auth-revoke
      name: auth-revoke
      description: REST surface for auth.revoke.
      operations:
      - method: POST
        name: authrevoke
        description: Slack Revoke an Access Token
        call: web-auth.authrevoke
        with:
          test: rest.test
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/auth-test
      name: auth-test
      description: REST surface for auth.test.
      operations:
      - method: POST
        name: authtest
        description: Slack Test Authentication
        call: web-auth.authtest
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-auth-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Web API — Auth. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-revoke-access-token
      description: Slack Revoke an Access Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: web-auth.authrevoke
      with:
        test: tools.test
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-test-authentication
      description: Slack Test Authentication
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: web-auth.authtest
      outputParameters:
      - type: object
        mapping: $.
