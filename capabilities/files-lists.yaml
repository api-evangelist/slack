naftiko: 1.0.0-alpha2
info:
  label: Slack Files API — Lists
  description: 'Slack Files API — Lists. 2 operations. Lead operation: Slack Get Files List. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Lists
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-lists
    baseUri: ''
    description: Slack Files API — Lists business capability. Self-contained, no shared references.
    resources:
    - name: files.list
      path: /files.list
      operations:
      - name: getfileslist
        method: GET
        description: Slack Get Files List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `files:read`'
        - name: user
          in: query
          type: string
          description: Filter files created by a single user.
        - name: channel
          in: query
          type: string
          description: Filter files appearing in a specific channel, indicated by its ID.
        - name: ts_from
          in: query
          type: number
          description: Filter files created after this timestamp (inclusive).
        - name: ts_to
          in: query
          type: number
          description: Filter files created before this timestamp (inclusive).
        - name: types
          in: query
          type: string
          description: Filter files by type ([see below](#file_types)). You can pass multiple values in the types argument,
            like `types=spaces,snippets`.The default value is `all`, wh
        - name: count
          in: query
          type: string
        - name: page
          in: query
          type: string
        - name: show_files_hidden_by_limit
          in: query
          type: boolean
          description: Show truncated file info for files hidden due to being too old, and the team who owns the file being
            over the file limit.
    - name: files.remote.list
      path: /files.remote.list
      operations:
      - name: getfilesremotelist
        method: GET
        description: Slack Get Files Remote List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `remote_files:read`'
        - name: channel
          in: query
          type: string
          description: Filter files appearing in a specific channel, indicated by its ID.
        - name: ts_from
          in: query
          type: number
          description: Filter files created after this timestamp (inclusive).
        - name: ts_to
          in: query
          type: number
          description: Filter files created before this timestamp (inclusive).
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return.
        - name: cursor
          in: query
          type: string
          description: Paginate through collections of data by setting the `cursor` parameter to a `next_cursor` attribute
            returned by a previous request's `response_metadata`. Defaul
  exposes:
  - type: rest
    namespace: files-lists-rest
    port: 8080
    description: REST adapter for Slack Files API — Lists. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/files-list
      name: files-list
      description: REST surface for files.list.
      operations:
      - method: GET
        name: getfileslist
        description: Slack Get Files List
        call: files-lists.getfileslist
        with:
          token: rest.token
          user: rest.user
          channel: rest.channel
          ts_from: rest.ts_from
          ts_to: rest.ts_to
          types: rest.types
          count: rest.count
          page: rest.page
          show_files_hidden_by_limit: rest.show_files_hidden_by_limit
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files-remote-list
      name: files-remote-list
      description: REST surface for files.remote.list.
      operations:
      - method: GET
        name: getfilesremotelist
        description: Slack Get Files Remote List
        call: files-lists.getfilesremotelist
        with:
          token: rest.token
          channel: rest.channel
          ts_from: rest.ts_from
          ts_to: rest.ts_to
          limit: rest.limit
          cursor: rest.cursor
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-lists-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Files API — Lists. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-files-list
      description: Slack Get Files List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-lists.getfileslist
      with:
        token: tools.token
        user: tools.user
        channel: tools.channel
        ts_from: tools.ts_from
        ts_to: tools.ts_to
        types: tools.types
        count: tools.count
        page: tools.page
        show_files_hidden_by_limit: tools.show_files_hidden_by_limit
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-get-files-remote-list
      description: Slack Get Files Remote List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: files-lists.getfilesremotelist
      with:
        token: tools.token
        channel: tools.channel
        ts_from: tools.ts_from
        ts_to: tools.ts_to
        limit: tools.limit
        cursor: tools.cursor
      outputParameters:
      - type: object
        mapping: $.
