naftiko: 1.0.0-alpha2
info:
  label: Slack Bookmarks API — Remove
  description: 'Slack Bookmarks API — Remove. 1 operations. Lead operation: Remove Bookmark. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookmarks-remove
    baseUri: https://slack.com/api
    description: Slack Bookmarks API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: bookmarks.remove
      path: /bookmarks.remove
      operations:
      - name: postbookmarksremove
        method: POST
        description: Remove Bookmark
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `bookmarks:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: bookmarks-remove-rest
    port: 8080
    description: REST adapter for Slack Bookmarks API — Remove. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bookmarks-remove
      name: bookmarks-remove
      description: REST surface for bookmarks.remove.
      operations:
      - method: POST
        name: postbookmarksremove
        description: Remove Bookmark
        call: bookmarks-remove.postbookmarksremove
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookmarks-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Bookmarks API — Remove. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: remove-bookmark
      description: Remove Bookmark
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookmarks-remove.postbookmarksremove
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
