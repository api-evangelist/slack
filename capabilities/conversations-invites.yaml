naftiko: 1.0.0-alpha2
info:
  label: Slack Conversations API — Invites
  description: 'Slack Conversations API — Invites. 1 operations. Lead operation: Slack Post Conversations Invite. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Invites
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-invites
    baseUri: ''
    description: Slack Conversations API — Invites business capability. Self-contained, no shared references.
    resources:
    - name: conversations.invite
      path: /conversations.invite
      operations:
      - name: postconversationsinvite
        method: POST
        description: Slack Post Conversations Invite
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `conversations:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: conversations-invites-rest
    port: 8080
    description: REST adapter for Slack Conversations API — Invites. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/conversations-invite
      name: conversations-invite
      description: REST surface for conversations.invite.
      operations:
      - method: POST
        name: postconversationsinvite
        description: Slack Post Conversations Invite
        call: conversations-invites.postconversationsinvite
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-invites-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Conversations API — Invites. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: slack-post-conversations-invite
      description: Slack Post Conversations Invite
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-invites.postconversationsinvite
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
