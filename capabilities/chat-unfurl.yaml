naftiko: 1.0.0-alpha2
info:
  label: Slack Chat API — Unfurl
  description: 'Slack Chat API — Unfurl. 1 operations. Lead operation: Slack Post Chat Unfurl. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Unfurl
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: chat-unfurl
    baseUri: ''
    description: Slack Chat API — Unfurl business capability. Self-contained, no shared references.
    resources:
    - name: chat.unfurl
      path: /chat.unfurl
      operations:
      - name: postchatunfurl
        method: POST
        description: Slack Post Chat Unfurl
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `links:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: chat-unfurl-rest
    port: 8080
    description: REST adapter for Slack Chat API — Unfurl. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/chat-unfurl
      name: chat-unfurl
      description: REST surface for chat.unfurl.
      operations:
      - method: POST
        name: postchatunfurl
        description: Slack Post Chat Unfurl
        call: chat-unfurl.postchatunfurl
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chat-unfurl-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Chat API — Unfurl. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-chat-unfurl
      description: Slack Post Chat Unfurl
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-unfurl.postchatunfurl
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
