naftiko: 1.0.0-alpha2
info:
  label: Slack Bookmarks API — Edit
  description: 'Slack Bookmarks API — Edit. 1 operations. Lead operation: Edit Bookmark. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Edit
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookmarks-edit
    baseUri: https://slack.com/api
    description: Slack Bookmarks API — Edit business capability. Self-contained, no shared references.
    resources:
    - name: bookmarks.edit
      path: /bookmarks.edit
      operations:
      - name: postbookmarksedit
        method: POST
        description: Edit Bookmark
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `bookmarks:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: bookmarks-edit-rest
    port: 8080
    description: REST adapter for Slack Bookmarks API — Edit. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bookmarks-edit
      name: bookmarks-edit
      description: REST surface for bookmarks.edit.
      operations:
      - method: POST
        name: postbookmarksedit
        description: Edit Bookmark
        call: bookmarks-edit.postbookmarksedit
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookmarks-edit-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Bookmarks API — Edit. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: edit-bookmark
      description: Edit Bookmark
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookmarks-edit.postbookmarksedit
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
