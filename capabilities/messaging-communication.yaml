      call: slack-emoji.list
      outputParameters:
      - type: object
        mapping: $.
    - name: manage-bookmarks
      description: Manage channel bookmarks.
      hints:
        readOnly: false
      call: slack-bookmarks.list
      outputParameters:
      - type: object
        mapping: $.
    - name: manage-canvases
      description: Manage canvases.
