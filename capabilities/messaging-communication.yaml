  exposes:
  - type: rest
    port: 8080
    namespace: messaging-api
    description: Unified REST API for Slack messaging and communication.
    resources:
    - path: /v1/messages
      name: messages
      description: Message management.
      operations:
      - method: POST
        name: post-message
        description: Post a message.
        call: slack-chat.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/conversations
      name: conversations
      description: Conversation management.
      operations:
      - method: GET
        name: list-conversations
        description: List conversations.
        call: slack-conversations.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/files
      name: files
      description: File management.
      operations:
      - method: GET
        name: list-files
        description: List files.
        call: slack-files.list
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/search
      name: search
      description: Search messages and files.
      operations:
      - method: GET
        name: search
        description: Search workspace.
        call: slack-search.list
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    port: 9080
    namespace: messaging-mcp
    transport: http
    description: MCP server for AI-assisted Slack messaging.
    tools:
    - name: post-message
      description: Post a message to a channel.
      hints:
        readOnly: false
      call: slack-chat.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-conversations
      description: List conversations.
      hints:
        readOnly: true
      call: slack-conversations.list
      outputParameters:
      - type: object
        mapping: $.
    - name: list-files
      description: List files.
      hints:
