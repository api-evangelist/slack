    namespace: slack-chat
    baseUri: https://slack.com/api
    description: Message posting, updating, deleting, and scheduling.
    authentication:
      type: bearer
      token: '{{SLACK_BOT_TOKEN}}'
    resources:
    - name: api
      path: /
      description: Chat API resources.
      operations:
      - name: list
        method: POST
        description: Access Chat resources.
        outputRawFormat: json
        outputParameters:
