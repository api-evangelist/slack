naftiko: 1.0.0-alpha2
info:
  label: Slack Messaging and Communication
  description: Unified workflow for messaging and communication including posting messages, managing conversations, sharing
    files, reacting, searching, and organizing with pins and stars. Used by app developers building communication integrations.
  tags:
  - Slack
  - Messaging
  - Communication
  - Chat
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SLACK_BOT_TOKEN: SLACK_BOT_TOKEN
capability:
