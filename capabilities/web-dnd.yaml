naftiko: 1.0.0-alpha2
info:
  label: Slack Web API — Dnd
  description: 'Slack Web API — Dnd. 2 operations. Lead operation: Slack Get Dnd Status for a User. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Dnd
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-dnd
    baseUri: https://slack.com/api
    description: Slack Web API — Dnd business capability. Self-contained, no shared references.
    resources:
    - name: dnd.info
      path: /dnd.info
      operations:
      - name: dndinfo
        method: GET
        description: Slack Get Dnd Status for a User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: user
          in: query
          type: string
          description: User to fetch status for.
    - name: dnd.setSnooze
      path: /dnd.setSnooze
      operations:
      - name: dndsetsnooze
        method: POST
        description: Slack Set Snooze Duration
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-dnd-rest
    port: 8080
    description: REST adapter for Slack Web API — Dnd. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/dnd-info
      name: dnd-info
      description: REST surface for dnd.info.
      operations:
      - method: GET
        name: dndinfo
        description: Slack Get Dnd Status for a User
        call: web-dnd.dndinfo
        with:
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dnd-setsnooze
      name: dnd-setsnooze
      description: REST surface for dnd.setSnooze.
      operations:
      - method: POST
        name: dndsetsnooze
        description: Slack Set Snooze Duration
        call: web-dnd.dndsetsnooze
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-dnd-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Web API — Dnd. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-dnd-status-user
      description: Slack Get Dnd Status for a User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: web-dnd.dndinfo
      with:
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-set-snooze-duration
      description: Slack Set Snooze Duration
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: web-dnd.dndsetsnooze
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
