naftiko: 1.0.0-alpha2
info:
  label: Slack Chat API — Deletes
  description: 'Slack Chat API — Deletes. 1 operations. Lead operation: Slack Post Chat Delete. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Deletes
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: chat-deletes
    baseUri: ''
    description: Slack Chat API — Deletes business capability. Self-contained, no shared references.
    resources:
    - name: chat.delete
      path: /chat.delete
      operations:
      - name: postchatdelete
        method: POST
        description: Slack Post Chat Delete
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `chat:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: chat-deletes-rest
    port: 8080
    description: REST adapter for Slack Chat API — Deletes. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/chat-delete
      name: chat-delete
      description: REST surface for chat.delete.
      operations:
      - method: POST
        name: postchatdelete
        description: Slack Post Chat Delete
        call: chat-deletes.postchatdelete
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: chat-deletes-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Chat API — Deletes. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-chat-delete
      description: Slack Post Chat Delete
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: chat-deletes.postchatdelete
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
