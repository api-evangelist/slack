naftiko: 1.0.0-alpha2
info:
  label: Slack Lists API — Delete
  description: 'Slack Lists API — Delete. 1 operations. Lead operation: Delete List Item. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Delete
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: lists-delete
    baseUri: https://slack.com/api
    description: Slack Lists API — Delete business capability. Self-contained, no shared references.
    resources:
    - name: slackLists.items.delete
      path: /slackLists.items.delete
      operations:
      - name: postslacklistsitemsdelete
        method: POST
        description: Delete List Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `lists:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: lists-delete-rest
    port: 8080
    description: REST adapter for Slack Lists API — Delete. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/slacklists-items-delete
      name: slacklists-items-delete
      description: REST surface for slackLists.items.delete.
      operations:
      - method: POST
        name: postslacklistsitemsdelete
        description: Delete List Item
        call: lists-delete.postslacklistsitemsdelete
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lists-delete-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Lists API — Delete. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: delete-list-item
      description: Delete List Item
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: lists-delete.postslacklistsitemsdelete
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
