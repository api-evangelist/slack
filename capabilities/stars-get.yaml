naftiko: 1.0.0-alpha2
info:
  label: Slack Stars API — Get
  description: 'Slack Stars API — Get. 1 operations. Lead operation: Slack Get Stars List. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: stars-get
    baseUri: ''
    description: Slack Stars API — Get business capability. Self-contained, no shared references.
    resources:
    - name: stars.list
      path: /stars.list
      operations:
      - name: getstarslist
        method: GET
        description: Slack Get Stars List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `stars:read`'
        - name: count
          in: query
          type: string
        - name: page
          in: query
          type: string
        - name: cursor
          in: query
          type: string
          description: 'Parameter for pagination. Set `cursor` equal to the `next_cursor` attribute returned by the previous
            request''s `response_metadata`. This parameter is optional, '
        - name: limit
          in: query
          type: integer
          description: The maximum number of items to return. Fewer than the requested number of items may be returned, even
            if the end of the list hasn't been reached.
  exposes:
  - type: rest
    namespace: stars-get-rest
    port: 8080
    description: REST adapter for Slack Stars API — Get. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/stars-list
      name: stars-list
      description: REST surface for stars.list.
      operations:
      - method: GET
        name: getstarslist
        description: Slack Get Stars List
        call: stars-get.getstarslist
        with:
          token: rest.token
          count: rest.count
          page: rest.page
          cursor: rest.cursor
          limit: rest.limit
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: stars-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Stars API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-stars-list
      description: Slack Get Stars List
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: stars-get.getstarslist
      with:
        token: tools.token
        count: tools.count
        page: tools.page
        cursor: tools.cursor
        limit: tools.limit
      outputParameters:
      - type: object
        mapping: $.
