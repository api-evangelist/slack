naftiko: 1.0.0-alpha2
info:
  label: Slack Lists API — Create
  description: 'Slack Lists API — Create. 2 operations. Lead operation: Create List. Self-contained Naftiko capability covering
    one Slack business surface.'
  tags:
  - Slack
  - Create
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: lists-create
    baseUri: https://slack.com/api
    description: Slack Lists API — Create business capability. Self-contained, no shared references.
    resources:
    - name: slackLists.create
      path: /slackLists.create
      operations:
      - name: postslacklistscreate
        method: POST
        description: Create List
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `lists:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: slackLists.items.create
      path: /slackLists.items.create
      operations:
      - name: postslacklistsitemscreate
        method: POST
        description: Create List Item
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `lists:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: lists-create-rest
    port: 8080
    description: REST adapter for Slack Lists API — Create. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/slacklists-create
      name: slacklists-create
      description: REST surface for slackLists.create.
      operations:
      - method: POST
        name: postslacklistscreate
        description: Create List
        call: lists-create.postslacklistscreate
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/slacklists-items-create
      name: slacklists-items-create
      description: REST surface for slackLists.items.create.
      operations:
      - method: POST
        name: postslacklistsitemscreate
        description: Create List Item
        call: lists-create.postslacklistsitemscreate
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: lists-create-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Lists API — Create. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: create-list
      description: Create List
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: lists-create.postslacklistscreate
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: create-list-item
      description: Create List Item
      hints:
        readOnly: true
        destructive: false
        idempotent: false
      call: lists-create.postslacklistsitemscreate
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
