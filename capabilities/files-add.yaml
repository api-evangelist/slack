naftiko: 1.0.0-alpha2
info:
  label: Slack Files API — Add
  description: 'Slack Files API — Add. 1 operations. Lead operation: Slack Post Files Remote Add. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-add
    baseUri: ''
    description: Slack Files API — Add business capability. Self-contained, no shared references.
    resources:
    - name: files.remote.add
      path: /files.remote.add
      operations:
      - name: postfilesremoteadd
        method: POST
        description: Slack Post Files Remote Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: files-add-rest
    port: 8080
    description: REST adapter for Slack Files API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/files-remote-add
      name: files-remote-add
      description: REST surface for files.remote.add.
      operations:
      - method: POST
        name: postfilesremoteadd
        description: Slack Post Files Remote Add
        call: files-add.postfilesremoteadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Files API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-files-remote-add
      description: Slack Post Files Remote Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: files-add.postfilesremoteadd
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
