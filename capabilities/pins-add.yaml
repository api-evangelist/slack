naftiko: 1.0.0-alpha2
info:
  label: Slack Pins API — Add
  description: 'Slack Pins API — Add. 1 operations. Lead operation: Slack Post Pins Add. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: pins-add
    baseUri: ''
    description: Slack Pins API — Add business capability. Self-contained, no shared references.
    resources:
    - name: pins.add
      path: /pins.add
      operations:
      - name: postpinsadd
        method: POST
        description: Slack Post Pins Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `pins:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: pins-add-rest
    port: 8080
    description: REST adapter for Slack Pins API — Add. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/pins-add
      name: pins-add
      description: REST surface for pins.add.
      operations:
      - method: POST
        name: postpinsadd
        description: Slack Post Pins Add
        call: pins-add.postpinsadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: pins-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Pins API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-pins-add
      description: Slack Post Pins Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: pins-add.postpinsadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
