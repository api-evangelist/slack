naftiko: 1.0.0-alpha2
info:
  label: Slack Conversations API — Join
  description: 'Slack Conversations API — Join. 1 operations. Lead operation: Slack Post Conversations Join. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Join
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: conversations-join
    baseUri: ''
    description: Slack Conversations API — Join business capability. Self-contained, no shared references.
    resources:
    - name: conversations.join
      path: /conversations.join
      operations:
      - name: postconversationsjoin
        method: POST
        description: Slack Post Conversations Join
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `channels:write`'
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: conversations-join-rest
    port: 8080
    description: REST adapter for Slack Conversations API — Join. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/conversations-join
      name: conversations-join
      description: REST surface for conversations.join.
      operations:
      - method: POST
        name: postconversationsjoin
        description: Slack Post Conversations Join
        call: conversations-join.postconversationsjoin
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: conversations-join-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Conversations API — Join. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: slack-post-conversations-join
      description: Slack Post Conversations Join
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: conversations-join.postconversationsjoin
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
