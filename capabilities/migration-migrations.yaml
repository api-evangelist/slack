naftiko: 1.0.0-alpha2
info:
  label: Slack Migration API — Migrations
  description: 'Slack Migration API — Migrations. 1 operations. Lead operation: Slack Get Migration Exchange. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Migrations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: migration-migrations
    baseUri: ''
    description: Slack Migration API — Migrations business capability. Self-contained, no shared references.
    resources:
    - name: migration.exchange
      path: /migration.exchange
      operations:
      - name: getmigrationexchange
        method: GET
        description: Slack Get Migration Exchange
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `tokens.basic`'
          required: true
        - name: users
          in: query
          type: string
          description: A comma-separated list of user ids, up to 400 per request
          required: true
        - name: team_id
          in: query
          type: string
          description: Specify team_id starts with `T` in case of Org Token
        - name: to_old
          in: query
          type: boolean
          description: Specify `true` to convert `W` global user IDs to workspace-specific `U` IDs. Defaults to `false`.
  exposes:
  - type: rest
    namespace: migration-migrations-rest
    port: 8080
    description: REST adapter for Slack Migration API — Migrations. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/migration-exchange
      name: migration-exchange
      description: REST surface for migration.exchange.
      operations:
      - method: GET
        name: getmigrationexchange
        description: Slack Get Migration Exchange
        call: migration-migrations.getmigrationexchange
        with:
          token: rest.token
          users: rest.users
          team_id: rest.team_id
          to_old: rest.to_old
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: migration-migrations-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Migration API — Migrations. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: slack-get-migration-exchange
      description: Slack Get Migration Exchange
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: migration-migrations.getmigrationexchange
      with:
        token: tools.token
        users: tools.users
        team_id: tools.team_id
        to_old: tools.to_old
      outputParameters:
      - type: object
        mapping: $.
