naftiko: 1.0.0-alpha2
info:
  label: Slack App Platform
  description: Unified workflow for building Slack apps including app management, interactive views, dialogs, bots, workflow
    functions, calls, and real-time messaging. Used by platform developers building Slack integrations.
  tags:
  - Slack
  - App Development
  - Platform
  - Automation
  created: '2026-04-18'
  modified: '2026-05-06'
binds:
- namespace: env
  keys:
    SLACK_BOT_TOKEN: SLACK_BOT_TOKEN
capability:
