naftiko: 1.0.0-alpha2
info:
  label: Slack DND API — End
  description: 'Slack DND API — End. 2 operations. Lead operation: Slack Post End Do Not Disturb. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - End
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: dnd-end
    baseUri: ''
    description: Slack DND API — End business capability. Self-contained, no shared references.
    resources:
    - name: dnd.endDnd
      path: /dnd.endDnd
      operations:
      - name: postdndenddnd
        method: POST
        description: Slack Post End Do Not Disturb
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `dnd:write`'
          required: true
    - name: dnd.endSnooze
      path: /dnd.endSnooze
      operations:
      - name: postdndendsnooze
        method: POST
        description: Slack Post End Do Not Disturb Snooze
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `dnd:write`'
          required: true
  exposes:
  - type: rest
    namespace: dnd-end-rest
    port: 8080
    description: REST adapter for Slack DND API — End. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/dnd-enddnd
      name: dnd-enddnd
      description: REST surface for dnd.endDnd.
      operations:
      - method: POST
        name: postdndenddnd
        description: Slack Post End Do Not Disturb
        call: dnd-end.postdndenddnd
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/dnd-endsnooze
      name: dnd-endsnooze
      description: REST surface for dnd.endSnooze.
      operations:
      - method: POST
        name: postdndendsnooze
        description: Slack Post End Do Not Disturb Snooze
        call: dnd-end.postdndendsnooze
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dnd-end-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack DND API — End. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-end-do-not
      description: Slack Post End Do Not Disturb
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dnd-end.postdndenddnd
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-end-do-not-2
      description: Slack Post End Do Not Disturb Snooze
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: dnd-end.postdndendsnooze
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
