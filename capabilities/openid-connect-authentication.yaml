naftiko: 1.0.0-alpha2
info:
  label: Slack OpenID Connect API — Authentication
  description: 'Slack OpenID Connect API — Authentication. 2 operations. Lead operation: Exchange OpenID Connect Token. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Authentication
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: openid-connect-authentication
    baseUri: https://slack.com/api
    description: Slack OpenID Connect API — Authentication business capability. Self-contained, no shared references.
    resources:
    - name: openid.connect.token
      path: /openid.connect.token
      operations:
      - name: postopenidconnecttoken
        method: POST
        description: Exchange OpenID Connect Token
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: openid.connect.userInfo
      path: /openid.connect.userInfo
      operations:
      - name: getopenidconnectuserinfo
        method: GET
        description: Get OpenID Connect User Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: OpenID Connect access token.
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: openid-connect-authentication-rest
    port: 8080
    description: REST adapter for Slack OpenID Connect API — Authentication. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/openid-connect-token
      name: openid-connect-token
      description: REST surface for openid.connect.token.
      operations:
      - method: POST
        name: postopenidconnecttoken
        description: Exchange OpenID Connect Token
        call: openid-connect-authentication.postopenidconnecttoken
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/openid-connect-userinfo
      name: openid-connect-userinfo
      description: REST surface for openid.connect.userInfo.
      operations:
      - method: GET
        name: getopenidconnectuserinfo
        description: Get OpenID Connect User Info
        call: openid-connect-authentication.getopenidconnectuserinfo
        with:
          token: rest.token
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: openid-connect-authentication-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack OpenID Connect API — Authentication. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: exchange-openid-connect-token
      description: Exchange OpenID Connect Token
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: openid-connect-authentication.postopenidconnecttoken
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: get-openid-connect-user-info
      description: Get OpenID Connect User Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: openid-connect-authentication.getopenidconnectuserinfo
      with:
        token: tools.token
      outputParameters:
      - type: object
        mapping: $.
