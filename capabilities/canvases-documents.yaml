    resources:
    - name: canvases.create
      path: /canvases.create
      operations:
      - name: postcanvasescreate
        method: POST
        description: Create Canvas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `canvases:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: canvases.delete
      path: /canvases.delete
      operations:
      - name: postcanvasesdelete
        method: POST
        description: Delete Canvas
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
