naftiko: 1.0.0-alpha2
info:
  label: Slack Files API — Remove
  description: 'Slack Files API — Remove. 1 operations. Lead operation: Slack Post Files Remote Remove. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Remove
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: files-remove
    baseUri: ''
    description: Slack Files API — Remove business capability. Self-contained, no shared references.
    resources:
    - name: files.remote.remove
      path: /files.remote.remove
      operations:
      - name: postfilesremoteremove
        method: POST
        description: Slack Post Files Remote Remove
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: false
  exposes:
  - type: rest
    namespace: files-remove-rest
    port: 8080
    description: REST adapter for Slack Files API — Remove. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/files-remote-remove
      name: files-remote-remove
      description: REST surface for files.remote.remove.
      operations:
      - method: POST
        name: postfilesremoteremove
        description: Slack Post Files Remote Remove
        call: files-remove.postfilesremoteremove
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: files-remove-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Files API — Remove. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-files-remote-remove
      description: Slack Post Files Remote Remove
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: files-remove.postfilesremoteremove
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
