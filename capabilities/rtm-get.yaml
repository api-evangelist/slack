naftiko: 1.0.0-alpha2
info:
  label: Slack RTM API — Get
  description: 'Slack RTM API — Get. 1 operations. Lead operation: Slack Get Rtm Connect. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Get
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: rtm-get
    baseUri: ''
    description: Slack RTM API — Get business capability. Self-contained, no shared references.
    resources:
    - name: rtm.connect
      path: /rtm.connect
      operations:
      - name: getrtmconnect
        method: GET
        description: Slack Get Rtm Connect
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `rtm:stream`'
          required: true
        - name: batch_presence_aware
          in: query
          type: boolean
          description: Batch presence deliveries via subscription. Enabling changes the shape of `presence_change` events.
            See [batch presence](/docs/presence-and-status#batching).
        - name: presence_sub
          in: query
          type: boolean
          description: Only deliver presence events when requested by subscription. See [presence subscriptions](/docs/presence-and-status#subscriptions).
  exposes:
  - type: rest
    namespace: rtm-get-rest
    port: 8080
    description: REST adapter for Slack RTM API — Get. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/rtm-connect
      name: rtm-connect
      description: REST surface for rtm.connect.
      operations:
      - method: GET
        name: getrtmconnect
        description: Slack Get Rtm Connect
        call: rtm-get.getrtmconnect
        with:
          token: rest.token
          batch_presence_aware: rest.batch_presence_aware
          presence_sub: rest.presence_sub
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: rtm-get-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack RTM API — Get. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-rtm-connect
      description: Slack Get Rtm Connect
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: rtm-get.getrtmconnect
      with:
        token: tools.token
        batch_presence_aware: tools.batch_presence_aware
        presence_sub: tools.presence_sub
      outputParameters:
      - type: object
        mapping: $.
