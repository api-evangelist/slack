naftiko: 1.0.0-alpha2
info:
  label: Slack Admin API — Archive
  description: 'Slack Admin API — Archive. 1 operations. Lead operation: Slack Post Admin Conversations Archive. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Archive
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-archive
    baseUri: ''
    description: Slack Admin API — Archive business capability. Self-contained, no shared references.
    resources:
    - name: admin.conversations.archive
      path: /admin.conversations.archive
      operations:
      - name: postadminconversationsarchive
        method: POST
        description: Slack Post Admin Conversations Archive
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `admin.conversations:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: admin-archive-rest
    port: 8080
    description: REST adapter for Slack Admin API — Archive. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin-conversations-archive
      name: admin-conversations-archive
      description: REST surface for admin.conversations.archive.
      operations:
      - method: POST
        name: postadminconversationsarchive
        description: Slack Post Admin Conversations Archive
        call: admin-archive.postadminconversationsarchive
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-archive-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Admin API — Archive. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-admin-conversations-archive
      description: Slack Post Admin Conversations Archive
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-archive.postadminconversationsarchive
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
