naftiko: 1.0.0-alpha2
info:
  label: Slack Bookmarks API — Add
  description: 'Slack Bookmarks API — Add. 1 operations. Lead operation: Add Bookmark. Self-contained Naftiko capability covering
    one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: bookmarks-add
    baseUri: https://slack.com/api
    description: Slack Bookmarks API — Add business capability. Self-contained, no shared references.
    resources:
    - name: bookmarks.add
      path: /bookmarks.add
      operations:
      - name: postbookmarksadd
        method: POST
        description: Add Bookmark
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `bookmarks:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: bookmarks-add-rest
    port: 8080
    description: REST adapter for Slack Bookmarks API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/bookmarks-add
      name: bookmarks-add
      description: REST surface for bookmarks.add.
      operations:
      - method: POST
        name: postbookmarksadd
        description: Add Bookmark
        call: bookmarks-add.postbookmarksadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: bookmarks-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Bookmarks API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: add-bookmark
      description: Add Bookmark
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: bookmarks-add.postbookmarksadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
