naftiko: 1.0.0-alpha2
info:
  label: Slack Web API — Pins
  description: 'Slack Web API — Pins. 3 operations. Lead operation: Slack Pin a Message. Self-contained Naftiko capability
    covering one Slack business surface.'
  tags:
  - Slack
  - Pins
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: web-pins
    baseUri: https://slack.com/api
    description: Slack Web API — Pins business capability. Self-contained, no shared references.
    resources:
    - name: pins.add
      path: /pins.add
      operations:
      - name: pinsadd
        method: POST
        description: Slack Pin a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: pins.list
      path: /pins.list
      operations:
      - name: pinslist
        method: GET
        description: Slack List Pinned Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: channel
          in: query
          type: string
          description: Channel to get pinned items for.
          required: true
    - name: pins.remove
      path: /pins.remove
      operations:
      - name: pinsremove
        method: POST
        description: Slack Unpin a Message
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.SLACK_API_KEY}}'
  exposes:
  - type: rest
    namespace: web-pins-rest
    port: 8080
    description: REST adapter for Slack Web API — Pins. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/pins-add
      name: pins-add
      description: REST surface for pins.add.
      operations:
      - method: POST
        name: pinsadd
        description: Slack Pin a Message
        call: web-pins.pinsadd
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins-list
      name: pins-list
      description: REST surface for pins.list.
      operations:
      - method: GET
        name: pinslist
        description: Slack List Pinned Items
        call: web-pins.pinslist
        with:
          channel: rest.channel
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/pins-remove
      name: pins-remove
      description: REST surface for pins.remove.
      operations:
      - method: POST
        name: pinsremove
        description: Slack Unpin a Message
        call: web-pins.pinsremove
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: web-pins-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Web API — Pins. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-pin-message
      description: Slack Pin a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: web-pins.pinsadd
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-list-pinned-items
      description: Slack List Pinned Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: web-pins.pinslist
      with:
        channel: tools.channel
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-unpin-message
      description: Slack Unpin a Message
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: web-pins.pinsremove
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
