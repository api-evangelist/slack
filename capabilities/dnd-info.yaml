naftiko: 1.0.0-alpha2
info:
  label: Slack DND API — Info
  description: 'Slack DND API — Info. 1 operations. Lead operation: Slack Get Do Not Disturb Info. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Info
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: dnd-info
    baseUri: ''
    description: Slack DND API — Info business capability. Self-contained, no shared references.
    resources:
    - name: dnd.info
      path: /dnd.info
      operations:
      - name: getdndinfo
        method: GET
        description: Slack Get Do Not Disturb Info
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: query
          type: string
          description: 'Authentication token. Requires scope: `dnd:read`'
        - name: user
          in: query
          type: string
          description: User to fetch status for (defaults to current user)
  exposes:
  - type: rest
    namespace: dnd-info-rest
    port: 8080
    description: REST adapter for Slack DND API — Info. One Spectral-compliant resource per consumed operation, prefixed with
      /v1.
    resources:
    - path: /v1/dnd-info
      name: dnd-info
      description: REST surface for dnd.info.
      operations:
      - method: GET
        name: getdndinfo
        description: Slack Get Do Not Disturb Info
        call: dnd-info.getdndinfo
        with:
          token: rest.token
          user: rest.user
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: dnd-info-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack DND API — Info. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-get-do-not-disturb
      description: Slack Get Do Not Disturb Info
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: dnd-info.getdndinfo
      with:
        token: tools.token
        user: tools.user
      outputParameters:
      - type: object
        mapping: $.
