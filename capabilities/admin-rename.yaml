naftiko: 1.0.0-alpha2
info:
  label: Slack Admin API — Rename
  description: 'Slack Admin API — Rename. 2 operations. Lead operation: Slack Post Admin Conversations Rename. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Rename
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: admin-rename
    baseUri: ''
    description: Slack Admin API — Rename business capability. Self-contained, no shared references.
    resources:
    - name: admin.conversations.rename
      path: /admin.conversations.rename
      operations:
      - name: postadminconversationsrename
        method: POST
        description: Slack Post Admin Conversations Rename
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `admin.conversations:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: admin.emoji.rename
      path: /admin.emoji.rename
      operations:
      - name: postadminemojirename
        method: POST
        description: Slack Post Admin Emoji Rename
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: admin-rename-rest
    port: 8080
    description: REST adapter for Slack Admin API — Rename. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/admin-conversations-rename
      name: admin-conversations-rename
      description: REST surface for admin.conversations.rename.
      operations:
      - method: POST
        name: postadminconversationsrename
        description: Slack Post Admin Conversations Rename
        call: admin-rename.postadminconversationsrename
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin-emoji-rename
      name: admin-emoji-rename
      description: REST surface for admin.emoji.rename.
      operations:
      - method: POST
        name: postadminemojirename
        description: Slack Post Admin Emoji Rename
        call: admin-rename.postadminemojirename
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: admin-rename-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Admin API — Rename. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-admin-conversations-rename
      description: Slack Post Admin Conversations Rename
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-rename.postadminconversationsrename
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: slack-post-admin-emoji-rename
      description: Slack Post Admin Emoji Rename
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: admin-rename.postadminemojirename
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
