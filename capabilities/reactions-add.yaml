naftiko: 1.0.0-alpha2
info:
  label: Slack Reactions API — Add
  description: 'Slack Reactions API — Add. 1 operations. Lead operation: Slack Post Reactions Add. Self-contained Naftiko
    capability covering one Slack business surface.'
  tags:
  - Slack
  - Add
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: reactions-add
    baseUri: ''
    description: Slack Reactions API — Add business capability. Self-contained, no shared references.
    resources:
    - name: reactions.add
      path: /reactions.add
      operations:
      - name: postreactionsadd
        method: POST
        description: Slack Post Reactions Add
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `reactions:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: reactions-add-rest
    port: 8080
    description: REST adapter for Slack Reactions API — Add. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/reactions-add
      name: reactions-add
      description: REST surface for reactions.add.
      operations:
      - method: POST
        name: postreactionsadd
        description: Slack Post Reactions Add
        call: reactions-add.postreactionsadd
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: reactions-add-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack Reactions API — Add. One tool per consumed operation, routed inline through this capability's
      consumes block.
    tools:
    - name: slack-post-reactions-add
      description: Slack Post Reactions Add
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: reactions-add.postreactionsadd
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
