naftiko: 1.0.0-alpha2
info:
  label: Slack User Groups API — Disables
  description: 'Slack User Groups API — Disables. 1 operations. Lead operation: Slack Post User Groups Disable. Self-contained
    Naftiko capability covering one Slack business surface.'
  tags:
  - Slack
  - Disables
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    SLACK_API_KEY: SLACK_API_KEY
capability:
  consumes:
  - type: http
    namespace: usergroups-disables
    baseUri: ''
    description: Slack User Groups API — Disables business capability. Self-contained, no shared references.
    resources:
    - name: usergroups.disable
      path: /usergroups.disable
      operations:
      - name: postusergroupsdisable
        method: POST
        description: Slack Post User Groups Disable
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: token
          in: header
          type: string
          description: 'Authentication token. Requires scope: `usergroups:write`'
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
  exposes:
  - type: rest
    namespace: usergroups-disables-rest
    port: 8080
    description: REST adapter for Slack User Groups API — Disables. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/usergroups-disable
      name: usergroups-disable
      description: REST surface for usergroups.disable.
      operations:
      - method: POST
        name: postusergroupsdisable
        description: Slack Post User Groups Disable
        call: usergroups-disables.postusergroupsdisable
        with:
          token: rest.token
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: usergroups-disables-mcp
    port: 9090
    transport: http
    description: MCP adapter for Slack User Groups API — Disables. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: slack-post-user-groups-disable
      description: Slack Post User Groups Disable
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: usergroups-disables.postusergroupsdisable
      with:
        token: tools.token
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
