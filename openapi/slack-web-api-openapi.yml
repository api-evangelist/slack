            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reminder:
                    type: object
                    properties:
                      id:
                        type: string
                      creator:
                        type: string
                      user:
                        type: string
                      text:
                        type: string
                      recurring:
                        type: boolean
                      time:
                        type: integer
                      complete_ts:
                        type: integer
  /reminders.list:
    get:
      tags:
        - reminders
      summary: List all reminders
