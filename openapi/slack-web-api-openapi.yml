                        id:
                          type: string
                        team_id:
                          type: string
                        is_usergroup:
                          type: boolean
                        name:
                          type: string
                        description:
                          type: string
                        handle:
                          type: string
                        is_external:
                          type: boolean
                        date_create:
                          type: integer
                        date_update:
                          type: integer
                        date_delete:
                          type: integer
                        auto_type:
                          type: string
                        created_by:
                          type: string
                        updated_by:
                          type: string
                        deleted_by:
                          type: string
                        user_count:
                          type: integer
                        users:
                          type: array
                          items:
                            type: string
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: >-
        Slack API uses Bearer token authentication. Pass a bot token or
        user token in the Authorization header.
  schemas:
    Message:
      type: object
      description: >-
        A Slack message object representing a single message in a
        conversation. Messages can contain text, blocks, attachments,
        files, and reactions.
      properties:
        type:
          type: string
          description: Always "message" for messages.
          const: message
        subtype:
          type: string
          description: >-
            Optional subtype indicating a specialized message type such
            as bot_message, channel_join, channel_leave, etc.
        channel:
          type: string
          description: The channel ID where the message was posted.
        user:
          type: string
          description: The user ID of the message author.
        text:
          type: string
          description: The text content of the message.
        ts:
          type: string
          description: >-
            Unique timestamp identifier for the message, also serves as
            the message ID. Format is Unix epoch with microseconds
            (e.g., "1503435956.000247").
        thread_ts:
          type: string
          description: >-
            The timestamp of the parent message in a thread. Present only
            for threaded replies.
        reply_count:
          type: integer
          description: Number of replies in the thread.
        reply_users_count:
          type: integer
          description: Number of unique users who have replied in the thread.
        latest_reply:
          type: string
          description: Timestamp of the most recent reply in the thread.
        reply_users:
          type: array
          description: Array of user IDs who have replied in the thread.
          items:
            type: string
        blocks:
          type: array
          description: >-
            An array of Block Kit layout blocks used for rich message
            formatting.
          items:
            type: object
        attachments:
          type: array
          description: An array of message attachments.
          items:
            type: object
            properties:
              id:
                type: integer
              color:
                type: string
              fallback:
                type: string
              text:
                type: string
              pretext:
                type: string
              author_name:
                type: string
              author_link:
                type: string
                format: uri
              author_icon:
                type: string
                format: uri
              title:
                type: string
              title_link:
                type: string
                format: uri
              fields:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      type: string
                    value:
                      type: string
                    short:
                      type: boolean
              footer:
                type: string
              footer_icon:
                type: string
                format: uri
              ts:
                type: integer
        files:
          type: array
          description: An array of file objects attached to the message.
          items:
            $ref: '#/components/schemas/File'
        reactions:
          type: array
          description: An array of emoji reactions on this message.
          items:
            type: object
            properties:
              name:
                type: string
                description: Emoji name without colons.
              count:
                type: integer
                description: Number of users who added this reaction.
              users:
                type: array
                description: User IDs of users who added this reaction.
                items:
                  type: string
        edited:
          type: object
          description: Edit information if the message was edited.
          properties:
            user:
              type: string
            ts:
              type: string
        bot_id:
          type: string
          description: Bot ID if the message was posted by a bot.
        bot_profile:
          type: object
          description: Bot profile information if posted by a bot.
          properties:
            id:
              type: string
            deleted:
              type: boolean
            name:
              type: string
            updated:
              type: integer
            app_id:
              type: string
            icons:
              type: object
        metadata:
          type: object
          description: >-
            Custom metadata attached to the message by an application.
          properties:
            event_type:
              type: string
            event_payload:
              type: object
        permalink:
          type: string
          format: uri
          description: Permalink URL for the message.
    Channel:
      type: object
      description: >-
        A Slack conversation object representing a channel, direct message,
        multi-person DM, or group conversation.
      properties:
        id:
          type: string
          description: The unique identifier for this conversation.
        name:
          type: string
          description: >-
            The name of the channel (without the leading # sign).
        name_normalized:
          type: string
          description: Normalized version of the channel name.
        is_channel:
          type: boolean
          description: Whether this is a public channel.
        is_group:
          type: boolean
          description: Whether this is a private channel (formerly a group).
        is_im:
          type: boolean
          description: Whether this is a direct message.
        is_mpim:
          type: boolean
          description: Whether this is a multi-person direct message.
        is_private:
          type: boolean
          description: Whether this is a private conversation.
        is_archived:
          type: boolean
          description: Whether the channel is archived.
        is_general:
          type: boolean
          description: Whether this is the #general channel.
        is_shared:
          type: boolean
          description: Whether the channel is shared with another workspace.
        is_ext_shared:
          type: boolean
          description: >-
            Whether the channel is shared with an external organization
            via Slack Connect.
        is_org_shared:
          type: boolean
          description: Whether the channel is shared across an Enterprise Grid org.
        is_pending_ext_shared:
          type: boolean
          description: Whether there is a pending external share invitation.
        is_member:
          type: boolean
          description: Whether the calling user is a member of this conversation.
        is_open:
          type: boolean
          description: Whether the DM is open.
        is_frozen:
          type: boolean
          description: Whether the channel is frozen.
        created:
          type: integer
          description: Unix timestamp of when the conversation was created.
        creator:
          type: string
          description: User ID of the member who created this channel.
        updated:
          type: integer
          description: Unix timestamp of the last update to the conversation.
        unlinked:
          type: integer
          description: Number of times the channel has been unlinked.
        topic:
          type: object
          description: The channel topic.
          properties:
            value:
              type: string
            creator:
              type: string
            last_set:
              type: integer
        purpose:
          type: object
          description: The channel purpose.
          properties:
            value:
              type: string
            creator:
              type: string
            last_set:
              type: integer
        previous_names:
          type: array
          description: A list of previous names the channel had.
          items:
            type: string
        num_members:
          type: integer
          description: >-
            The number of members in the channel. Only included when
            specifically requested.
        locale:
          type: string
          description: >-
            IETF language code for the channel locale. Only included
            when specifically requested.
        user:
          type: string
          description: >-
            For direct messages, the user ID of the other participant.
        shared_team_ids:
          type: array
          description: >-
            Array of team IDs that share this channel (for shared
            channels).
          items:
            type: string
        parent_conversation:
          type: string
          description: Parent conversation ID for thread-only channels.
        context_team_id:
          type: string
          description: The workspace team ID.
        properties:
          type: object
          description: Additional channel properties.
          properties:
            tabs:
              type: array
              items:
                type: object
    User:
      type: object
      description: >-
        A Slack user object representing a workspace member with their
        profile, roles, and settings.
      properties:
        id:
          type: string
          description: The unique identifier for this user.
        team_id:
          type: string
          description: The workspace team ID this user belongs to.
        name:
          type: string
          description: The user's username.
        deleted:
          type: boolean
          description: Whether the user has been deactivated.
        color:
          type: string
          description: >-
            A hex color code used in certain client displays for this
            user.
        real_name:
          type: string
          description: The user's real name.
        tz:
          type: string
          description: The user's timezone identifier (e.g., "America/Los_Angeles").
        tz_label:
          type: string
          description: Descriptive label for the user's timezone.
        tz_offset:
          type: integer
          description: The user's timezone offset from UTC in seconds.
        profile:
          type: object
          description: The user's profile information.
          properties:
            avatar_hash:
              type: string
            status_text:
              type: string
              description: The user's current status text.
            status_emoji:
              type: string
              description: >-
                The user's current status emoji.
            status_expiration:
              type: integer
              description: Unix timestamp when the status expires.
            real_name:
              type: string
            display_name:
              type: string
              description: >-
                The display name the user has chosen.
            real_name_normalized:
              type: string
            display_name_normalized:
              type: string
            email:
              type: string
              format: email
              description: >-
                The user's email address. Requires users:read.email scope.
            first_name:
              type: string
            last_name:
              type: string
            title:
              type: string
              description: The user's job title.
            phone:
              type: string
            skype:
              type: string
            image_24:
              type: string
              format: uri
            image_32:
              type: string
              format: uri
            image_48:
              type: string
              format: uri
            image_72:
              type: string
              format: uri
            image_192:
              type: string
              format: uri
            image_512:
              type: string
              format: uri
            image_original:
              type: string
              format: uri
            team:
              type: string
        is_admin:
          type: boolean
          description: Whether the user is a workspace admin.
        is_owner:
          type: boolean
          description: Whether the user is a workspace owner.
        is_primary_owner:
          type: boolean
          description: Whether the user is the primary workspace owner.
        is_restricted:
          type: boolean
          description: Whether the user is a guest with single-channel access.
        is_ultra_restricted:
          type: boolean
          description: Whether the user is a single-channel guest.
        is_bot:
          type: boolean
          description: Whether the user is a bot.
        is_app_user:
          type: boolean
          description: Whether the user is an app user.
        updated:
          type: integer
          description: Unix timestamp of when the user was last updated.
        has_2fa:
          type: boolean
          description: Whether the user has two-factor authentication enabled.
        locale:
          type: string
          description: >-
            IETF language code for the user. Only included when
            specifically requested.
    File:
      type: object
      description: >-
        A Slack file object representing an uploaded file with its
        metadata and sharing information.
      properties:
        id:
          type: string
          description: Unique file identifier.
        created:
          type: integer
          description: Unix timestamp of when the file was created.
        timestamp:
          type: integer
          description: Unix timestamp.
        name:
          type: string
          description: The file name.
        title:
          type: string
          description: Title of the file.
        mimetype:
          type: string
          description: MIME type of the file.
        filetype:
          type: string
          description: Slack file type identifier (e.g., "png", "pdf", "snippet").
        pretty_type:
          type: string
          description: Human-readable file type.
        user:
          type: string
          description: User ID of the user who uploaded the file.
        user_team:
          type: string
          description: Team ID of the user who uploaded the file.
        editable:
          type: boolean
          description: Whether the file content is editable.
        size:
          type: integer
          description: File size in bytes.
        mode:
          type: string
          description: >-
            File mode (e.g., "hosted", "external", "snippet", "post").
        is_external:
          type: boolean
          description: Whether the file is externally hosted.
        external_type:
          type: string
          description: Type of external file.
        is_public:
          type: boolean
          description: Whether the file is public.
        public_url_shared:
          type: boolean
        display_as_bot:
          type: boolean
        username:
          type: string
        url_private:
          type: string
          format: uri
          description: URL to access the file. Requires authentication.
        url_private_download:
          type: string
          format: uri
          description: URL to download the file. Requires authentication.
        permalink:
          type: string
          format: uri
          description: Permalink URL for the file.
        permalink_public:
          type: string
          format: uri
          description: Public permalink URL for the file (if shared publicly).
        channels:
          type: array
          description: Array of channel IDs where the file is shared.
          items:
            type: string
        groups:
          type: array
          description: Array of private channel IDs where the file is shared.
          items:
            type: string
        ims:
          type: array
          description: Array of DM IDs where the file is shared.
          items:
            type: string
        shares:
          type: object
          description: Sharing information broken down by type.
        comments_count:
          type: integer
          description: Number of comments on the file.
    ResponseMetadata:
      type: object
      description: >-
        Metadata for paginated responses containing cursor information.
      properties:
        next_cursor:
          type: string
          description: >-
            An opaque cursor to use in the next request to get the next
            page of results. Empty string indicates no more results.
    ErrorResponse:
      type: object
      description: Standard error response from the Slack API.
      properties:
        ok:
          type: boolean
          const: false
        error:
          type: string
          description: >-
            A short machine-readable error code such as "channel_not_found",
            "not_authed", "invalid_auth", "missing_scope", etc.
        response_metadata:
          type: object
          properties:
            messages:
              type: array
              items:
                type: string
      required:
        - ok
        - error
