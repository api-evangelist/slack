                    type: integer
  /reminders.add:
    post:
      tags:
        - reminders
      summary: Create a reminder
      description: Creates a reminder for a user.
      operationId: remindersAdd
      externalDocs:
        description: API method documentation
        url: https://docs.slack.dev/reference/methods/reminders.add
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - text
                - time
              properties:
                text:
                  type: string
                  description: The content of the reminder.
                time:
                  type: string
                  description: >-
                    When this reminder should happen: Unix timestamp, or
