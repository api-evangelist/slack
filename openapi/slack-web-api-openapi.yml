      operationId: remindersList
      externalDocs:
        description: API method documentation
        url: https://docs.slack.dev/reference/methods/reminders.list
      responses:
        '200':
          description: Reminders listed
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean
                  reminders:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        creator:
                          type: string
                        user:
                          type: string
                        text:
                          type: string
                        recurring:
                          type: boolean
                        time:
                          type: integer
                        complete_ts:
                          type: integer
  /bookmarks.add:
    post:
      tags:
        - bookmarks
      summary: Add a bookmark to a channel
      description: Adds a bookmark to a channel.
      operationId: bookmarksAdd
      externalDocs:
        description: API method documentation
        url: https://docs.slack.dev/reference/methods/bookmarks.add
      requestBody:
        required: true
